name: Vouch Management

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  manage:
    if: contains(github.event.comment.body, 'vouch') || contains(github.event.comment.body, 'denounce')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Manage Vouch Status
        uses: mitchellh/vouch/action/manage-by-discussion@v1
        with:
          comment-node-id: ${{ github.event.comment.node_id }}
          discussion-number: ${{ github.event.issue.number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
